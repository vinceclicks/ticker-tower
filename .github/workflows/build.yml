name: Build

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  build-webui:
    name: Build WebUI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: TickerTower.WebUI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: TickerTower.WebUI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

  build-api:
    name: Build API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore TickerTower.slnx

      - name: Build solution
        run: dotnet build TickerTower.slnx --configuration Release --no-restore